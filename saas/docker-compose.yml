services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adc}
      POSTGRES_DB: ${POSTGRES_DB:-adc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["worker"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_NAME: ${APP_NAME:-ADC Trading Platform}
      DATABASE_URL: postgresql://${POSTGRES_USER:-adc}:${POSTGRES_PASSWORD:-adc}@postgres:5432/${POSTGRES_DB:-adc}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://localhost:3000","http://localhost:8000"]}
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-yahoo}
      BROKER_PROVIDER: ${BROKER_PROVIDER:-mock}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app

  celery:
    profiles: ["worker"]
    build:
      context: ./apps/api
    command: celery -A app.workers.celery worker --loglevel=info
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-adc}:${POSTGRES_PASSWORD:-adc}@postgres:5432/${POSTGRES_DB:-adc}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me}
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-yahoo}
      BROKER_PROVIDER: ${BROKER_PROVIDER:-mock}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./apps/web:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
